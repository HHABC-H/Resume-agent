<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试模拟器 · 历史记录</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="page">
    <header class="topbar">
        <a class="brand" href="/">面试模拟器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/upload">上传简历</a>
            <a href="/interview-entry">模拟面试</a>
            <a href="/history" class="active">历史记录</a>
            <a href="/profile">个人中心</a>
            <div id="authActions" class="nav-auth"></div>
        </nav>
    </header>

    <section class="hero">
        <span class="chip">记录分栏</span>
        <h1>历史会话追踪</h1>
        <p>已将“简历分析记录”和“面试记录”分开展示，你可以更快定位当前需要继续的流程。</p>
    </section>

    <section class="panel" style="margin-top: 16px;">
        <div class="history-toolbar">
            <div class="tabs history-tabs">
                <button type="button" id="tabInterviewBtn" class="tab-btn active">面试记录</button>
                <button type="button" id="tabAnalysisBtn" class="tab-btn">简历分析记录</button>
            </div>
            <div class="footer-actions history-actions">
                <a class="btn btn-primary" href="/interview-entry">模拟面试</a>
                <a class="btn btn-secondary" href="/upload">上传简历</a>
            </div>
        </div>

        <div id="errorMessage" class="message error" style="display: none;"></div>

        <table class="table" style="margin-top: 12px;">
            <thead>
            <tr>
                <th>Resume ID</th>
                <th>状态</th>
                <th>岗位</th>
                <th>简历分</th>
                <th>评估分</th>
                <th>题目数</th>
                <th>更新时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="historyBody">
            <tr>
                <td colspan="8" class="muted">正在加载历史记录...</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<script src="/js/auth-client.js"></script>
<script>
AuthClient.initPage({ requireAuth: true });

const historyBody = document.getElementById('historyBody');
const errorMessage = document.getElementById('errorMessage');
const tabInterviewBtn = document.getElementById('tabInterviewBtn');
const tabAnalysisBtn = document.getElementById('tabAnalysisBtn');

const RECORD_INTERVIEW = 'interview';
const RECORD_ANALYSIS = 'analysis';

let currentRecordType = resolveInitialRecordType();
let allHistoryRecords = [];

function resolveInitialRecordType() {
    const type = new URLSearchParams(window.location.search).get('type');
    return type === RECORD_ANALYSIS ? RECORD_ANALYSIS : RECORD_INTERVIEW;
}

function formatTime(time) {
    if (!time) return '-';
    const date = new Date(time);
    if (Number.isNaN(date.getTime())) return time;
    return date.toLocaleString('zh-CN', { hour12: false });
}

function getStatusLabel(status) {
    const labels = {
        ANALYZED: '已分析',
        QUESTIONS_READY: '题目已生成',
        EVALUATED: '已评估'
    };
    return labels[status] || status;
}

function getPositionLabel(positionType) {
    const labels = {
        BACKEND_JAVA: '后端 Java',
        FRONTEND: '前端',
        ALGORITHM: '算法'
    };
    return labels[positionType] || '后端 Java';
}

function isInterviewRecord(item) {
    return item.status === 'QUESTIONS_READY' || item.status === 'EVALUATED';
}

function isAnalysisRecord(item) {
    return item.status === 'ANALYZED';
}

function getFilteredRecords() {
    return allHistoryRecords.filter((item) => {
        if (currentRecordType === RECORD_ANALYSIS) {
            return isAnalysisRecord(item);
        }
        return isInterviewRecord(item);
    });
}

function renderActionButtons(item) {
    if (currentRecordType === RECORD_ANALYSIS) {
        return `
            <div class="table-actions">
                <a class="btn btn-secondary btn-mini" href="/analysis/${item.resumeId}">查看分析</a>
                <a class="btn btn-primary btn-mini" href="/interview/${item.resumeId}">开始模拟面试</a>
            </div>
        `;
    }

    if (item.status === 'EVALUATED') {
        return `
            <div class="table-actions">
                <a class="btn btn-primary btn-mini" href="/result/${item.resumeId}">查看面试结果</a>
                <a class="btn btn-secondary btn-mini" href="/analysis/${item.resumeId}">查看分析</a>
            </div>
        `;
    }

    return `
        <div class="table-actions">
            <a class="btn btn-primary btn-mini" href="/interview/${item.resumeId}">继续面试</a>
            <a class="btn btn-secondary btn-mini" href="/analysis/${item.resumeId}">查看分析</a>
        </div>
    `;
}

function renderHistoryTable() {
    const rows = getFilteredRecords();
    if (!rows.length) {
        const text = currentRecordType === RECORD_ANALYSIS
            ? '暂无简历分析记录，先去上传简历完成分析。'
            : '暂无面试记录，先从简历分析记录里开始模拟面试。';
        historyBody.innerHTML = `<tr><td colspan="8" class="muted">${text}</td></tr>`;
        return;
    }

    historyBody.innerHTML = rows.map((item) => `
        <tr>
            <td>${item.resumeId}</td>
            <td>${getStatusLabel(item.status)}</td>
            <td>${getPositionLabel(item.positionType)}</td>
            <td>${item.resumeScore ?? '-'}</td>
            <td>${item.evaluationScore ?? '-'}</td>
            <td>${item.questionCount ?? 0}</td>
            <td>${formatTime(item.updatedAt)}</td>
            <td>${renderActionButtons(item)}</td>
        </tr>
    `).join('');
}

function syncTabState() {
    tabInterviewBtn.classList.toggle('active', currentRecordType === RECORD_INTERVIEW);
    tabAnalysisBtn.classList.toggle('active', currentRecordType === RECORD_ANALYSIS);
}

function syncUrlState() {
    const url = new URL(window.location.href);
    url.searchParams.set('type', currentRecordType);
    window.history.replaceState(null, '', url);
}

function switchRecordType(type) {
    currentRecordType = type;
    syncTabState();
    syncUrlState();
    renderHistoryTable();
}

async function loadHistory() {
    errorMessage.style.display = 'none';
    historyBody.innerHTML = '<tr><td colspan="8" class="muted">正在加载历史记录...</td></tr>';

    try {
        const response = await AuthClient.authFetch('/api/resume/history?limit=30');
        if (!response.ok) {
            throw new Error('获取历史记录失败');
        }

        const data = await response.json();
        allHistoryRecords = Array.isArray(data) ? data : [];
        renderHistoryTable();
    } catch (error) {
        historyBody.innerHTML = '<tr><td colspan="8" class="muted">加载失败，请重试。</td></tr>';
        errorMessage.textContent = error.message || '加载失败';
        errorMessage.style.display = 'block';
    }
}

tabInterviewBtn.addEventListener('click', () => switchRecordType(RECORD_INTERVIEW));
tabAnalysisBtn.addEventListener('click', () => switchRecordType(RECORD_ANALYSIS));

document.addEventListener('DOMContentLoaded', () => {
    syncTabState();
    syncUrlState();
    loadHistory();
});
</script>
</body>
</html>
