<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试模拟器 · 模拟面试</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="page">
    <header class="topbar">
        <a class="brand" href="/">面试模拟器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/upload">上传简历</a>
            <a href="/interview-entry" class="active">模拟面试</a>
            <a href="/history">历史记录</a>
            <a href="/profile">个人中心</a>
            <div id="authActions" class="nav-auth"></div>
        </nav>
    </header>

    <section class="hero reveal">
        <span class="chip">步骤 3 / 4</span>
        <h1>选择模拟面试入口</h1>
        <p>系统会基于你上传的简历内容自动生成面试题，支持后端 Java / 前端 / 算法三个方向。</p>
    </section>

    <section class="grid grid-2" style="margin-top: 16px;">
        <article class="panel reveal">
            <h2>从已有简历开始</h2>
            <p class="muted">进入“简历分析记录”，选择一条记录后点击“开始模拟面试”，即可按该简历自动出题。</p>
            <div class="footer-actions">
                <a href="/history?type=analysis" class="btn btn-primary">去简历分析记录</a>
            </div>
        </article>
        <article class="panel reveal" style="animation-delay: 0.1s;">
            <h2>上传新简历后面试</h2>
            <p class="muted">如果你更新了简历，建议先重新上传并完成分析，再进入模拟面试，题目会更贴合。</p>
            <div class="footer-actions">
                <a href="/upload" class="btn btn-secondary">去上传简历</a>
            </div>
        </article>
    </section>
</div>
<script src="/js/auth-client.js"></script>
<script>
AuthClient.initPage({ requireAuth: true });
</script>
</body>
</html>
