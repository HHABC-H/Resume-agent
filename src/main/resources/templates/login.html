<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试模拟器 · 登录</title>
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
<div class="page auth-page" id="authApp">
    <header class="topbar">
        <a class="brand" href="/">面试模拟器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/login" class="active">登录</a>
            <a href="/register">注册</a>
        </nav>
    </header>

    <section class="auth-layout">
        <div class="auth-side panel">
            <span class="chip">账号中心</span>
            <h1>登录后开始你的面试训练</h1>
            <p>从简历分析、智能提问到评估报告，全流程都将在你的账号下保存。</p>
            <ul class="list muted">
                <li>支持多岗位模式：后端 Java / 前端 / 算法</li>
                <li>支持历史记录追踪和持续复盘</li>
                <li>支持流式面试评估反馈</li>
            </ul>
        </div>

        <div class="auth-card panel">
            <h2>欢迎回来</h2>
            <p class="muted">请输入账号密码登录。</p>
            <div class="form-grid">
                <input v-model.trim="username" type="text" placeholder="用户名">
                <input v-model="password" type="password" placeholder="密码">
            </div>
            <div class="form-actions" style="margin-top: 14px;">
                <button class="btn btn-primary" type="button" :disabled="loading" @click="submitLogin">
                    {{ loading ? '登录中...' : '登录' }}
                </button>
                <a class="btn btn-secondary" href="/register">去注册</a>
            </div>
            <div v-if="message" :class="messageType === 'error' ? 'message error' : 'message info'">{{ message }}</div>
        </div>
    </section>
</div>

<script src="/js/auth-client.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const redirectTarget = new URLSearchParams(window.location.search).get('redirect') || '/upload';
const presetUsername = new URLSearchParams(window.location.search).get('username') || '';
const { createApp } = Vue;

createApp({
    data() {
        return {
            username: presetUsername,
            password: '',
            loading: false,
            message: '',
            messageType: 'error'
        };
    },
    methods: {
        async submitLogin() {
            this.message = '';
            if (!this.username || !this.password) {
                this.message = '请输入用户名和密码';
                this.messageType = 'error';
                return;
            }
            this.loading = true;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: this.username, password: this.password })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || '登录失败');
                }

                AuthClient.setToken(data.token, data.expiresAt);
                localStorage.setItem('resume_agent_username', data.username || '');
                localStorage.setItem('resume_agent_user_id', String(data.userId || ''));
                window.location.href = redirectTarget;
            } catch (e) {
                this.message = e.message || '登录失败';
                this.messageType = 'error';
            } finally {
                this.loading = false;
            }
        }
    }
}).mount('#authApp');
</script>
</body>
</html>
