<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟面试器 · 评估结果</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="page">
    <header class="topbar">
        <a class="brand" href="/">徐庶模拟面试器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/upload" class="active">上传简历</a>
            <a href="/history">历史记录</a>
        </nav>
    </header>

    <section class="hero" th:if="${evaluation}">
        <span class="chip">步骤 4 / 4</span>
        <h1>面试评估报告</h1>
        <p th:text="${evaluation.overallFeedback}">整体表现稳定，建议补充底层原理深度。</p>
        <div style="margin-top: 18px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap;">
            <div class="score-circle" th:text="${evaluation.overallScore} + '/100'">88/100</div>
            <div>
                <p class="muted" th:text="'总题数：' + ${evaluation.totalQuestions}">总题数：8</p>
                <p class="muted" th:text="${evaluation.overallScore >= 90} ? '评级：优秀' : (${evaluation.overallScore >= 75} ? '评级：良好' : (${evaluation.overallScore >= 60} ? '评级：及格' : '评级：不及格'))">评级：良好</p>
            </div>
        </div>
    </section>

    <section th:if="${evaluation}" style="margin-top: 16px;">
        <div class="tabs">
            <button class="tab-btn active" data-tab="summary">总结概览</button>
            <button class="tab-btn" data-tab="details">逐题反馈</button>
            <button class="tab-btn" data-tab="references">参考答案</button>
        </div>

        <div id="summary" class="tab-panel active">
            <div class="grid grid-2">
                <section class="panel">
                    <h2>分类得分</h2>
                    <div th:each="catScore : ${evaluation.categoryScores}" class="metric" style="margin-bottom: 10px;">
                        <div>
                            <strong th:text="${catScore.category}">Java 基础</strong>
                            <span class="muted" th:text="${catScore.score} + '/100（' + ${catScore.questionCount} + '题）'">85/100（2题）</span>
                        </div>
                        <div class="progress" style="margin-top: 8px;"><span th:style="'width:' + ${catScore.score} + '%'" style="width: 85%"></span></div>
                    </div>
                </section>

                <section class="panel">
                    <h2>优势与建议</h2>
                    <h3 style="margin-bottom: 8px;">优势</h3>
                    <ul class="list" style="margin-bottom: 12px;">
                        <li th:each="strength : ${evaluation.strengths}" th:text="${strength}">并发基础扎实。</li>
                    </ul>
                    <h3 style="margin-bottom: 8px;">建议</h3>
                    <ul class="list muted">
                        <li th:each="improvement : ${evaluation.improvements}" th:text="${improvement}">补充事务隔离级别的场景对比。</li>
                    </ul>
                </section>
            </div>
        </div>

        <div id="details" class="tab-panel">
            <section class="panel" th:each="detail : ${evaluation.questionDetails}" style="margin-bottom: 12px;">
                <div class="chip" th:text="'问题 ' + ${detail.questionIndex} + ' · ' + ${detail.category}">问题 1 · Java 并发</div>
                <h2 style="font-size: 20px; margin-top: 10px;" th:text="${detail.question}">请解释线程池核心参数。</h2>
                <p><strong>你的回答：</strong></p>
                <p class="muted" th:text="${detail.userAnswer}">回答内容</p>
                <p><strong>得分：</strong><span th:text="${detail.score} + '/100'">80/100</span></p>
                <p><strong>反馈：</strong><span th:text="${detail.feedback}">建议补充拒绝策略。</span></p>
            </section>
        </div>

        <div id="references" class="tab-panel">
            <section class="panel" th:each="ref : ${evaluation.referenceAnswers}" style="margin-bottom: 12px;">
                <div class="chip" th:text="'问题 ' + ${ref.questionIndex}">问题 1</div>
                <h2 style="font-size: 20px; margin-top: 10px;" th:text="${ref.question}">问题描述</h2>
                <p><strong>参考答案：</strong></p>
                <p class="muted" th:text="${ref.referenceAnswer}">参考答案内容</p>
                <p><strong>核心要点：</strong></p>
                <ul class="list">
                    <li th:each="point : ${ref.keyPoints}" th:text="${point}">关键点</li>
                </ul>
            </section>
        </div>
    </section>

    <section class="panel" th:unless="${evaluation}">
        <p class="muted">正在加载评估结果...</p>
    </section>

    <div class="footer-actions" th:if="${evaluation}">
        <a href="/history" class="btn btn-secondary">查看历史记录</a>
        <a href="/upload" class="btn btn-warning">重新开始</a>
    </div>
</div>

<script>
const tabButtons = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');

tabButtons.forEach((button) => {
    button.addEventListener('click', () => {
        const tab = button.dataset.tab;

        tabButtons.forEach((item) => item.classList.remove('active'));
        tabPanels.forEach((panel) => panel.classList.remove('active'));

        button.classList.add('active');
        document.getElementById(tab).classList.add('active');
    });
});
</script>
</body>
</html>
