<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试模拟器 · 注册</title>
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
<div class="page auth-page" id="registerApp">
    <header class="topbar">
        <a class="brand" href="/">面试模拟器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/login">登录</a>
            <a href="/register" class="active">注册</a>
        </nav>
    </header>

    <section class="auth-layout">
        <div class="auth-side panel">
            <span class="chip">新用户注册</span>
            <h1>创建你的面试模拟器账号</h1>
            <p>注册后可保存历史记录，并在不同岗位模式间切换练习。</p>
            <ul class="list muted">
                <li>用户名长度 3-64</li>
                <li>密码至少 6 位</li>
                <li>邮箱和显示名称可选</li>
            </ul>
        </div>

        <div class="auth-card panel">
            <h2>注册账号</h2>
            <p class="muted">填写信息后立即创建账号。</p>
            <div class="form-grid">
                <input v-model.trim="username" type="text" placeholder="用户名（3-64）">
                <input v-model.trim="email" type="email" placeholder="邮箱（可选）">
                <input v-model.trim="displayName" type="text" placeholder="显示名称（可选）">
                <input v-model="password" type="password" placeholder="密码（至少6位）">
            </div>
            <div class="form-actions" style="margin-top: 14px;">
                <button class="btn btn-primary" type="button" :disabled="loading" @click="submitRegister">
                    {{ loading ? '提交中...' : '创建账号' }}
                </button>
                <a class="btn btn-secondary" href="/login">返回登录</a>
            </div>
            <div v-if="message" :class="messageType === 'error' ? 'message error' : 'message info'">{{ message }}</div>
        </div>
    </section>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            username: '',
            email: '',
            displayName: '',
            password: '',
            loading: false,
            message: '',
            messageType: 'error'
        };
    },
    methods: {
        async submitRegister() {
            this.message = '';
            if (!this.username || !this.password) {
                this.message = '用户名和密码不能为空';
                this.messageType = 'error';
                return;
            }

            this.loading = true;
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: this.username,
                        email: this.email || null,
                        displayName: this.displayName || null,
                        password: this.password
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || '注册失败');
                }

                this.message = '注册成功，正在跳转登录页...';
                this.messageType = 'info';
                setTimeout(() => {
                    window.location.href = `/login?username=${encodeURIComponent(this.username)}`;
                }, 600);
            } catch (e) {
                this.message = e.message || '注册失败';
                this.messageType = 'error';
            } finally {
                this.loading = false;
            }
        }
    }
}).mount('#registerApp');
</script>
</body>
</html>
