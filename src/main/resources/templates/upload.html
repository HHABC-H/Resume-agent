<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟面试器 · 上传简历</title>
    <link rel="stylesheet" th:href="@{/css/theme.css}" href="/css/theme.css">
</head>
<body>
<div class="page">
    <header class="topbar">
        <a class="brand" href="/">徐庶模拟面试器</a>
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/upload" class="active">上传简历</a>
            <a href="/history">历史记录</a>
            <a href="/profile">个人中心</a>
            <div id="authActions" class="nav-auth"></div>
        </nav>
    </header>

    <section class="hero reveal">
        <span class="chip">步骤 1 / 4</span>
        <h1>上传简历，开始分析。</h1>
        <p>建议上传最新版本简历。系统会在 10-30 秒内完成智能评分和建议生成。</p>
    </section>

    <section class="panel reveal" style="margin-top: 16px;">
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-grid" style="margin-bottom: 12px;">
                <label for="positionType"><strong>目标岗位</strong></label>
                <select id="positionType">
                    <option value="BACKEND_JAVA">后端 Java</option>
                    <option value="FRONTEND">前端</option>
                    <option value="ALGORITHM">算法</option>
                </select>
            </div>

            <div id="uploadArea" class="upload-zone">
                <div style="font-size: 36px;">📄</div>
                <p><strong>点击选择文件</strong> 或拖拽文件到这里</p>
                <p class="muted">支持 PDF / DOC / DOCX / TXT，大小不超过 10MB</p>
                <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" hidden>
            </div>

            <div id="fileInfo" class="message info" style="display: none;"></div>
            <div id="errorMessage" class="message error" style="display: none;"></div>

            <div class="footer-actions">
                <button id="submitBtn" type="submit" class="btn btn-primary" disabled>开始评分</button>
                <a href="/" class="btn btn-secondary">返回首页</a>
            </div>

            <div id="loading" style="display:none; margin-top: 12px;" class="muted">正在智能分析简历，请稍候...</div>
        </form>
    </section>
</div>

<script src="/js/auth-client.js"></script>
<script>
AuthClient.initPage({ requireAuth: true });

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const submitBtn = document.getElementById('submitBtn');
const fileInfo = document.getElementById('fileInfo');
const errorMessage = document.getElementById('errorMessage');
const loading = document.getElementById('loading');
const uploadForm = document.getElementById('uploadForm');
const positionType = document.getElementById('positionType');

let selectedFile = null;

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
    if (!file) {
        return;
    }

    const validTypes = [
        'application/pdf',
        'application/msword',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'text/plain'
    ];

    const fileName = file.name.toLowerCase();
    const isValidType = validTypes.includes(file.type)
        || fileName.endsWith('.pdf')
        || fileName.endsWith('.doc')
        || fileName.endsWith('.docx')
        || fileName.endsWith('.txt');

    if (!isValidType) {
        showError('仅支持 PDF、DOC、DOCX 或 TXT 格式的简历文件');
        return;
    }

    if (file.size > 10 * 1024 * 1024) {
        showError('文件大小不能超过 10MB');
        return;
    }

    selectedFile = file;
    submitBtn.disabled = false;
    errorMessage.style.display = 'none';
    fileInfo.style.display = 'block';
    fileInfo.innerHTML = `<strong>已选择：</strong>${file.name}（${(file.size / 1024).toFixed(2)} KB）`;
}

function showError(message) {
    selectedFile = null;
    submitBtn.disabled = true;
    fileInfo.style.display = 'none';
    errorMessage.textContent = message;
    errorMessage.style.display = 'block';
}

uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!selectedFile) {
        return;
    }

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('positionType', positionType.value);

    submitBtn.disabled = true;
    loading.style.display = 'block';

    try {
        const response = await AuthClient.authFetch('/api/resume/upload', { method: 'POST', body: formData });
        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || '上传失败');
        }

        window.location.href = '/analysis/' + data.resumeId;
    } catch (error) {
        showError(error.message || '网络错误，请重试');
    } finally {
        loading.style.display = 'none';
        submitBtn.disabled = false;
    }
});
</script>
</body>
</html>
