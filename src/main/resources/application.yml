spring:
  application:
    name: skills-agent-example
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/resume_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:317480}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  ai:
    dashscope:
      api-key: sk-669c5a2462c94c689774bb03d465dbcf
      chat:
        options:
          enable-thinking: true
    minimax:
      api-key: ${MINIMAX_API_KEY}
  mvc:
    async:
      request-timeout: 600000
server:
  port: 8080

app:
  ai:
    retry:
      max-attempts: 3
      backoff-ms: 800
      max-backoff-ms: 4000

logging:
    level:
      org.springframework.ai: DEBUG
      com.alibaba.cloud.ai: DEBUG
      org.hibernate.SQL: INFO
