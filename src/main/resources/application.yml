spring:
  application:
    name: skills-agent-example
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          enable-thinking: true
    minimax:
      api-key: ${MINIMAX_API_KEY}
server:
  port: 8080

logging:
    level:
      org.springframework.ai: DEBUG
      com.alibaba.cloud.ai: DEBUG